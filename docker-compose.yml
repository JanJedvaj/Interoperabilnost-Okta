services:
  postgres:
    image: postgres:16
    container_name: interoperability-okta-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-interoperability_okta}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
